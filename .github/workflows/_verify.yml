name: Verify

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to run checks on.
        required: false
        type: string
        default: "20"
      run-checks:
        description: Whether to run format/lint/type-check/test steps.
        required: false
        type: boolean
        default: true
      run-build:
        description: Whether to run build step.
        required: false
        type: boolean
        default: true
      upload-dist-artifact:
        description: Whether to upload dist as an artifact after build.
        required: false
        type: boolean
        default: false
      download-dist-artifact:
        description: Whether to download dist artifact before smoke test.
        required: false
        type: boolean
        default: false
      run-smoke-test:
        description: Whether to run CLI dry-run smoke test.
        required: false
        type: boolean
        default: true

jobs:
  verify:
    name: Verify (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Check format
        if: ${{ inputs.run-checks }}
        run: pnpm format:check

      - name: Check lint
        if: ${{ inputs.run-checks }}
        run: pnpm lint:check

      - name: Check types
        if: ${{ inputs.run-checks }}
        run: pnpm type:check

      - name: Build (TS to JS)
        if: ${{ inputs.run-build }}
        run: pnpm build

      - name: Upload dist artifact
        if: ${{ inputs.upload-dist-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: treg-dist
          path: dist
          if-no-files-found: error

      - name: Run tests
        if: ${{ inputs.run-checks }}
        run: pnpm test

      - name: Download dist artifact
        if: ${{ inputs.download-dist-artifact }}
        uses: actions/download-artifact@v4
        with:
          name: treg-dist
          path: dist

      - name: CLI smoke test (dry run)
        if: ${{ inputs.run-smoke-test }}
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/dist/init-project.js" ]; then
            echo "Missing dist/init-project.js before smoke test."
            exit 1
          fi
          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/package.json" <<'JSON'
          { "name": "ci-smoke", "version": "1.0.0" }
          JSON
          (
            cd "$tmpdir"
            node "$GITHUB_WORKSPACE/dist/init-project.js" init --dry-run
          )
