name: CI

on:
  push:
    branches:
      - main

jobs:
  verify:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release') }}"
    uses: ./.github/workflows/_verify.yml
    with:
      node-version: "20"
      run-checks: true
      run-build: true
      upload-dist-artifact: true
      download-dist-artifact: false
      run-smoke-test: false

  smoke-test:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release') }}"
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    uses: ./.github/workflows/_verify.yml
    with:
      node-version: ${{ matrix.node-version }}
      run-checks: false
      run-build: false
      upload-dist-artifact: false
      download-dist-artifact: true
      run-smoke-test: true
